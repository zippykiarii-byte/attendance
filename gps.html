<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin GPS</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" type="text/css" href="css/form.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/logo.png" alt="logo" width="20%">
  </div>
  <div class="user">
    <label id="lbusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="students.html">Students</a>
    <a href="admins.html">Admins</a>
    <a href="gps.html">GPS</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card">
      <h3>Active</h3>
      <p class="stat-number" id="lbactive">loading...</p>
    </div>
    <div class="card">
      <h3>Inactive</h3>
      <p class="stat-number" id="lbinactive">loading...</p>
    </div>
  </div>

  

  <!-- Form -->
  <div class="card">
    <h2>Add new GPS</h2>
      <div class="form-group">
        <label>Venue name</label>
        <input type="text" placeholder="Enter full name" id="txtvenuename">
      </div>
      <div class="form-group">
        <label>Venue code</label>
        <input type="text" placeholder="Enter program" id="txtvenuecode">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select>
          <option>active</option>
          <option>inactive</option>
        </select>
      </div>
      <div class="form-group">
        <label>Longitude</label>
        <input type="text" placeholder="Enter program" id="txtlongitude">
      </div>
      <div class="form-group">
        <label>Latitude</label>
        <input type="text" placeholder="Enter program" id="txtlatitude">
      </div>
      <button class="btn-primary btngreen" id="btnaddcourse">Add New GPS</button>
  </div>

  <!-- Table -->
  <div class="card">
    <h2>Active GPS</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Venue Code</th>
            <th>Venue Name</th>
            <th>Latitude </th>
            <th>Longitude</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tablebodyactive"></tbody>
      </table>
    </div>
  </div>

   <div class="card">
    <h2>Inactive GPS</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Venue Code</th>
            <th>Venue Name</th>
            <th>Latitude </th>
            <th>Longitude</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tablebodyinactive"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Elimu Admin Panel</p>
</footer>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="js/config.js"></script>
<script src="js/gps.js"></script>
<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });

let lbusername = document.getElementById('lbusername')
auth.onAuthStateChanged( function (user) {
  if (user) {
    lbusername.innerHTML= user.email
  }else{
    window.location.href ="index.html"
  }
})
</script>

</body>
</html>
